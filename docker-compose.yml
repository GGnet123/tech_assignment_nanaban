services:
  postgres:
    image: postgres:16-alpine
    container_name: nanaban-postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nanaban-network

  migrate:
    image: migrate/migrate
    container_name: nanaban-migrate
    volumes:
      - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable&search_path=public", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nanaban-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nanaban-app
    ports:
      - "${APP_PORT}:${APP_PORT}"
      - "${PROMETHEUS_PORT}:${PROMETHEUS_PORT}"
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=${APP_ENV}
      - APP_HOST=${APP_HOST}
      - APP_PORT=${APP_PORT}
      - PROMETHEUS_PORT=${PROMETHEUS_PORT}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - GOMEMLIMIT=${GOMEMLIMIT}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - nanaban-network
    restart: unless-stopped

  lint:
    image: golangci/golangci-lint:latest-alpine
    working_dir: /app
    volumes:
      - .:/app
      - lint-cache:/root/.cache
    command: golangci-lint run ./...
    profiles:
      - tools

volumes:
  postgres_data:
  lint-cache:

networks:
  nanaban-network:
    driver: bridge
